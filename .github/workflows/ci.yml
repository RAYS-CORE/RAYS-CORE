# Runs on every push and on every pull request (including from forks once Actions are enabled).
# You add this file by committing it — no GitHub website setup required beyond pushing.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} · Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and test tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"

      - name: Smoke import (installed entrypoint)
        run: python -c "from rays_core import rays_main, config_locator; print('imports ok')"

      - name: Run tests (pytest + bytecode compile smoke)
        run: python -m pytest tests/ -q

      - name: Build wheel and sdist
        run: |
          python -m pip install build "twine>=6.1"
          python -m build
          twine check dist/*
